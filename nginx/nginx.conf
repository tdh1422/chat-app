server {
  listen 80;

  location /api/ {
    proxy_pass http://backend:5000;
  }

  location /socket/ {
    proxy_pass http://socket:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location / {
    proxy_pass http://frontend:80;
  }
}